---
# See the documentation for more information:
# https://packit.dev/docs/configuration/

downstream_package_name: netavark
upstream_tag_template: v{version}

# These files get synced from upstream to downstream (Fedora / CentOS Stream) on every
# propose-downstream job. This is done so tests maintained upstream can be run
# downstream in Zuul CI and Bodhi.
# Ref: https://packit.dev/docs/configuration#files_to_sync
files_to_sync:
  - src: plans/
    dest: plans/
    delete: true
    mkpath: true
  - src: test/tmt
    dest: test/tmt
    delete: true
    mkpath: true
  - src: .fmf/
    dest: .fmf/
    delete: true
  - .packit.yaml

packages:
  netavark-fedora:
    pkg_tool: fedpkg
    specfile_path: rpm/netavark.spec
  netavark-centos:
    pkg_tool: centpkg
    specfile_path: rpm/netavark.spec
  netavark-eln:
    specfile_path: rpm/netavark.spec

srpm_build_deps:
  - cargo
  - git-archive-all
  - make
  - openssl-devel

# https://packit.dev/docs/configuration/actions
# fix-spec-file only operates on copr builds and doesn't affect official distro builds
actions:
  fix-spec-file: "bash .packit-copr-rpm.sh"

jobs:
  - job: copr_build
    trigger: pull_request
    packages: [netavark-fedora]
    targets: &fedora_copr_targets
      - fedora-all-x86_64
      - fedora-all-aarch64
    enable_net: true
    osh_diff_scan_after_copr_build: false

  - job: copr_build
    trigger: pull_request
    packages: [netavark-eln]
    targets:
      fedora-eln-x86_64:
        additional_repos:
          - "https://kojipkgs.fedoraproject.org/repos/eln-build/latest/x86_64/"
      fedora-eln-aarch64:
        additional_repos:
          - "https://kojipkgs.fedoraproject.org/repos/eln-build/latest/aarch64/"
    enable_net: true

  - job: copr_build
    trigger: pull_request
    packages: [netavark-centos]
    targets: &centos_copr_targets
      - centos-stream-10-x86_64
      - centos-stream-10-aarch64
    enable_net: true

  # Run on commit to main branch
  - job: copr_build
    trigger: commit
    packages: [netavark-fedora]
    branch: main
    owner: rhcontainerbot
    project: podman-next
    enable_net: true

  # Tests on Fedora
  - job: tests
    trigger: pull_request
    identifier: integration-fedora
    packages: [netavark-fedora]
    targets: *fedora_copr_targets
    tmt_plan: "/plans/integration"
    tf_extra_params: &tf_extra_params_fedora
      environments:
        - artifacts:
          - type: repository-file
            id: https://copr.fedorainfracloud.org/coprs/rhcontainerbot/podman-next/repo/fedora-$releasever/rhcontainerbot-podman-next-fedora-$releasever.repo

  # Tests on CentOS Stream
  - job: tests
    trigger: pull_request
    identifier: integration-centos
    packages: [netavark-centos]
    targets: *centos_copr_targets
    tmt_plan: "/plans/integration"
    tf_extra_params: &tf_extra_params_centos
      environments:
        - artifacts:
          - type: repository-file
            id: https://copr.fedorainfracloud.org/coprs/rhcontainerbot/podman-next/repo/centos-stream-$releasever/rhcontainerbot-podman-next-centos-stream-$releasever.repo

  # Validate test (no RPM build needed, runs only on latest stable Fedora)
  - job: tests
    trigger: pull_request
    identifier: validate
    skip_build: true
    targets:
      - fedora-latest-stable-x86_64
    tmt_plan: "/plans/validate"

  # Unit tests (no RPM build needed, runs only on latest stable Fedora)
  - job: tests
    trigger: pull_request
    identifier: unit
    skip_build: true
    targets:
      - fedora-latest-stable-x86_64
    tmt_plan: "/plans/unit"

  # Podman tests on Fedora
  - job: tests
    trigger: pull_request
    identifier: podman-fedora
    packages: [netavark-fedora]
    targets: *fedora_copr_targets
    tmt_plan: "/plans/podman"
    tf_extra_params: *tf_extra_params_fedora

  # Podman tests on CentOS Stream
  - job: tests
    trigger: pull_request
    identifier: podman-centos
    packages: [netavark-centos]
    targets: *centos_copr_targets
    tmt_plan: "/plans/podman"
    tf_extra_params: *tf_extra_params_centos

  # Sync to Fedora
  # NOTE: Breaking changes related to Podman6 will only be shipped to Fedora
  # Rawhide (to be Fedora 45) and newer.
  # TODO: Update dist_git_branches as and when new Fedora releases are
  # available.
  - job: propose_downstream
    trigger: release
    packages: [netavark-fedora]
    update_release: false
    dist_git_branches:
      - fedora-rawhide

  # Sync to CentOS Stream
  - job: propose_downstream
    trigger: release
    packages: [netavark-centos]
    update_release: false
    dist_git_branches:
      - c10s

  - job: koji_build
    trigger: commit
    packages: [netavark-fedora]
    sidetag_group: netavark-releases
    dist_git_branches:
      - fedora-all

  - job: bodhi_update
    trigger: koji_build
    packages: [netavark-fedora]
    sidetag_group: netavark-releases
    dependencies:
      - aardvark-dns
    dist_git_branches:
      - fedora-all
