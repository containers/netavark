---
# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: rpm/netavark.spec
upstream_tag_template: v{version}

srpm_build_deps:
  - cargo
  - make
  - openssl-devel

jobs:
  - job: copr_build
    trigger: pull_request
    notifications:
      failure_comment:
        message: "Ephemeral COPR build failed. @containers/packit-build please check."
    enable_net: true
    targets: &copr_build_targets
      - fedora-rawhide-x86_64
      - fedora-rawhide-aarch64
        # - fedora-latest-x86_64
        #- fedora-latest-aarch64
        #- fedora-latest-stable-x86_64
        #- fedora-latest-stable-aarch64
        #- centos-stream-9-x86_64
        #- centos-stream-9-aarch64
        #- centos-stream-8-x86_64
        #- centos-stream-8-aarch64
    additional_repos:
      - "copr://rhcontainerbot/podman-next"

  # Run on commit to main branch
  - job: copr_build
    trigger: commit
    notifications:
      failure_comment:
        message: "podman-next COPR build failed. @containers/packit-build please check."
    branch: main
    owner: rhcontainerbot
    project: podman-next
    enable_net: true

  # Test on the same arches as copr_build_targets used for ephemeral copr build
  #- job: tests
  #  trigger: pull_request
      # Disabling notifications until spam comments are figured out
      #  notifications:
      #failure_comment:
      #  message: "TMT test failed. @containers/packit-build please check."
      #targets: &copr_test_targets
      #- fedora-rawhide-x86_64
      #- fedora-rawhide-aarch64
      #skip_build: true
      #identifier: validate
      #tmt_plan: "/plans/validate_test"

      #- job: tests
      #trigger: pull_request
      #notifications:
      #failure_comment:
      #  message: "TMT tests failed. @containers/packit-build please check."
      #targets: *copr_test_targets
      #skip_build: true
      #identifier: unit
      #tmt_plan: "/plans/unit_test"

  - job: tests
    trigger: pull_request
      #notifications:
      #failure_comment:
      #  message: "TMT tests failed. @containers/packit-build please check."
    targets: &copr_test_targets
      - fedora-rawhide-x86_64
      - fedora-rawhide-aarch64
    skip_build: true
    identifier: integration
    tmt_plan: "/plans/integration_test"

  - job: propose_downstream
    trigger: release
    update_release: false
    dist_git_branches:
      - fedora-all

  - job: koji_build
    trigger: commit
    dist_git_branches:
      - fedora-all

        # NOTE: Bodhi update tasks are disabled to allow netavark and aardvark-dns X.Y
        # builds in a single manual bodhi update. Leaving this commented out
        # but not deleted so it's not forgotten.
        #- job: bodhi_update
        #trigger: commit
        #dist_git_branches:
        #- fedora-branched # rawhide updates are created automatically
